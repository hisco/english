<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#7c3aed">
    <title>Say & Find English</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section id="picker-screen" class="screen screen-active" aria-labelledby="picker-title">
        <div class="hero">
          <p class="eyebrow">Tap, listen, and learn</p>
          <h1 id="picker-title">Say & Find English</h1>
          <p class="hero-copy">Choose a pack. Everything works on this device after the first load.</p>
        </div>
        <div id="pack-grid" class="pack-grid" aria-label="Word packs"></div>
      </section>
      <section id="game-screen" class="screen game-screen" aria-labelledby="game-title">
        <div id="parent-exit" class="parent-exit" aria-label="Hold to return to packs"></div>
        <header class="game-header">
          <div>
            <p id="pack-theme" class="eyebrow"></p>
            <h1 id="game-title">Listen and find</h1>
          </div>
          <div id="game-progress" class="progress-pill"></div>
        </header>
        <div class="prompt-area">
          <button id="prompt-card" class="card prompt-card" type="button" aria-label="Hear the word"></button>
          <p id="helper-text" class="helper-text">Tap the big card to hear the word.</p>
        </div>
        <div id="choice-grid" class="choice-grid" aria-label="Choices"></div>
      </section>
    </main>
    <noscript>
      <div class="noscript">This game needs JavaScript enabled on this device.</div>
    </noscript>
  </body>
</html>
